<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="nav">
        <div class="logohome">
            <div class="logo"><img src="logo.svg" alt="logo"></div>
            <div class="home"><img height="30px" width="30px" src="home.svg" alt="home"></div>
        </div>
        <div class="searchbox">
            <div class="icon">
                <img height="30px" width="30px" src="icon.svg" alt="search">
            </div>
            <div class="label">
                <div>What do you want to play?&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|
                </div>
            </div>
            <div class="last"><img height="30px" width="30px" src="browse-svgrepo-com.svg" alt="browse"></div>
        </div>
        <div class="psd">
            <div>Prenium</div>
            <div>Support</div>
            <div>Download&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|</div>
        </div>
        <div class="dash"></div>
        <div class="ia">
            <div class="installicon"><img style="opacity: 0.75; margin-top: 4px;" height="20px" width="20px" src="installicon.svg" alt="installicon"></div>
            <div class="install"><div>Install</div></div>
        </div>
        <div class="sl">
            <div class="s"><div>Sign Up</div></div>
            <div class="l"><div>Login</div></div>
        </div>
    </div>
    <div class="main">
        <div class="sidebar"></div>
        <div class="playlists"></div>
    </div>
</body>

</html>
